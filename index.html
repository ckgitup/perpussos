<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokus Dialektika | www.sosiologi.eu.org</title>
    
    <!-- Core Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Spectral:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        serif: ['"Spectral"', 'serif'],
                    },
                    colors: {
                        scholastic: {
                            base: '#f5f5f4', // Stone 50 - Bersahaja
                            ink: '#1c1917',   // Stone 900 - Keterbacaan Utama
                            lead: '#57534e',  // Stone 600 - Dewasa
                            border: '#d6d3d1', // Stone 300 - Garis Jujur
                            accent: '#44403c'  // Stone 700 - Minimal Modern
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Desain Scrollbar Fokus */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #57534e; }
        
        body { 
            background-color: #f5f5f4; 
            color: #1c1917;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
            font-size: 1rem; 
            line-height: 1.6;
        }
        .dark body { background-color: #0c0a09; color: #e7e5e4; }

        /* Arsitektur Kartu: Mikro-Interaksi Profesional */
        .arch-card {
            background: #ffffff;
            border: 1px solid #e7e5e4;
            /* Transisi diperhalus dengan kurva bezier yang lebih elegan */
            transition: 
                transform 0.4s cubic-bezier(0.2, 0, 0, 1), 
                border-color 0.4s ease, 
                box-shadow 0.4s ease,
                background-color 0.4s ease;
            position: relative;
            z-index: 1;
        }
        .dark .arch-card {
            background: #141413;
            border: 1px solid #292524;
        }

        /* Hover: Elevasi Subtil & Bayangan Berlapis */
        .arch-card:hover {
            transform: translateY(-4px); /* Elevasi proporsional, tidak melayang jauh */
            border-color: #57534e; /* Bergeser ke warna Lead yang lebih berwibawa */
            /* Bayangan berlapis (layered shadow) untuk kesan kedalaman alami */
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05), 
                0 10px 20px -5px rgba(0, 0, 0, 0.03);
            background-color: #fdfdfd; /* Pergeseran warna latar yang sangat tipis */
            z-index: 10;
        }
        .dark .arch-card:hover {
            border-color: #78716c;
            background-color: #1a1a19;
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.5);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent 25%, rgba(0, 0, 0, 0.02) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmerEffect 2s infinite linear;
        }
        @keyframes shimmerEffect { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Kontrol Rigiditas untuk Keseragaman Grid */
        .line-clamp-titles { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 700; line-height: 1.3; }
        .line-clamp-descs { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; opacity: 0.8; font-size: 0.85rem; line-height: 1.5; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-scholastic-accent selection:text-white">

    <!-- Navigasi Minimalis -->
    <nav class="fixed top-4 right-4 z-[200] flex flex-row gap-2">
        <button onclick="toggleDarkMode()" class="w-9 h-9 arch-card rounded flex items-center justify-center text-scholastic-lead hover:text-scholastic-ink transition-all">
            <i id="theme-ico" class="fa-solid fa-circle-half-stroke text-[11px]"></i>
        </button>
        <button onclick="openOtoritas()" id="admin-trigger" class="w-9 h-9 arch-card rounded flex items-center justify-center text-stone-500 hover:text-scholastic-ink transition-all">
            <i class="fa-solid fa-key text-[11px]"></i>
        </button>
        <button onclick="openEditor()" id="add-btn" class="hidden w-9 h-9 bg-scholastic-ink text-white rounded flex items-center justify-center hover:opacity-90 transition-all">
            <i class="fa-solid fa-plus text-[11px]"></i>
        </button>
    </nav>

    <!-- Professional Editorial Header -->
    <header class="max-w-screen-2xl mx-auto px-6 pt-12 pb-8 border-b border-stone-200 dark:border-stone-800">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-scholastic-lead block mb-2">Sociology Digital Archive</span>
                <h1 class="text-4xl md:text-5xl font-serif font-black text-scholastic-ink dark:text-white tracking-tight">
                    Lokus Dialektika<span class="text-stone-400">.</span>
                </h1>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="text-[10px] font-black text-stone-500 uppercase tracking-[0.6em] block mb-1">www.sosiologi.eu.org</span>
                <div class="text-[11px] font-serif italic text-scholastic-lead">Struktur &bull; Agensi &bull; Perubahan</div>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <main class="max-w-screen-2xl mx-auto px-6 pb-20">
        <div class="flex flex-col lg:flex-row items-center gap-2 mt-6 mb-12 sticky top-4 z-50">
            <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded p-1.5 flex-1 w-full flex items-center gap-3">
                <div class="relative flex-1 group">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-stone-400 text-[11px]"></i>
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari narasi atau indeks materi..." class="w-full pl-10 pr-4 py-2 bg-transparent border-none focus:ring-0 text-scholastic-ink dark:text-white font-medium text-sm placeholder-stone-400">
                </div>
                <div class="h-5 w-[1px] bg-stone-200 dark:bg-stone-700 hidden md:block"></div>
                <div class="flex items-center gap-1 overflow-x-auto no-scrollbar pr-1 shrink-0">
                    <button onclick="applyFilter('all')" id="f-all" class="tab-btn active px-3.5 py-2 rounded text-[9px] font-bold uppercase tracking-widest transition-all bg-scholastic-ink text-white">Semua</button>
                    <button onclick="applyFilter('X')" id="f-X" class="tab-btn px-4 py-2 rounded text-[9px] font-bold uppercase tracking-widest transition-all text-scholastic-lead hover:bg-stone-100 dark:hover:bg-stone-800">Kelas X</button>
                    <button onclick="applyFilter('XI')" id="f-XI" class="tab-btn px-4 py-2 rounded text-[9px] font-bold uppercase tracking-widest transition-all text-scholastic-lead hover:bg-stone-100 dark:hover:bg-stone-800">Kelas XI</button>
                    <button onclick="applyFilter('XII')" id="f-XII" class="tab-btn px-4 py-2 rounded text-[9px] font-bold uppercase tracking-widest transition-all text-scholastic-lead hover:bg-stone-100 dark:hover:bg-stone-800">Kelas XII</button>
                </div>
            </div>
        </div>

        <!-- Optimized Grid (1 to 5 Columns) -->
        <div id="grid-content" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-5 gap-4">
            <!-- Data injected here -->
        </div>

        <div id="no-data" class="hidden py-40 text-center">
            <h3 class="text-[11px] font-bold text-stone-500 dark:text-stone-700 uppercase tracking-[0.4em]">Arsip Kosong</h3>
        </div>
    </main>

    <!-- SYSTEMS MODAL -->
    <div id="modal-overlay" class="fixed inset-0 bg-stone-900/80 backdrop-blur-sm z-[300] hidden items-center justify-center p-4 transition-all duration-300 opacity-0">
        <!-- Auth Modal -->
        <div id="modal-auth" class="hidden arch-card w-full max-w-xs rounded p-8 text-center shadow-2xl border-none">
            <h3 class="text-xs font-black text-scholastic-ink dark:text-white mb-6 uppercase tracking-[0.2em]">Otoritas Kurator</h3>
            <input type="password" id="auth-field" class="w-full bg-stone-50 dark:bg-black/20 border border-stone-200 dark:border-stone-800 rounded p-3 text-center text-3xl tracking-[0.5em] mb-4 outline-none focus:border-scholastic-lead dark:text-white" placeholder="••••">
            <div class="flex flex-col gap-2">
                <button onclick="doAuth()" class="w-full py-3 bg-scholastic-ink text-white rounded font-bold text-[10px] uppercase tracking-widest active:opacity-80 transition-all">Verifikasi</button>
                <button onclick="closeModals()" class="w-full py-2 text-stone-400 text-[10px] font-bold uppercase">Batal</button>
            </div>
        </div>

        <!-- Editor Modal -->
        <div id="modal-editor" class="hidden arch-card w-full max-w-lg rounded p-6 relative overflow-y-auto max-h-[90vh] shadow-2xl border-none">
            <div class="flex justify-between items-center mb-5 border-b border-stone-100 dark:border-stone-800 pb-3">
                <h3 id="form-header" class="text-sm font-bold uppercase tracking-widest text-scholastic-ink dark:text-white">Input Materi</h3>
                <button onclick="closeModals()" class="text-stone-400 hover:text-red-700 transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="main-form" class="space-y-4">
                <input type="hidden" id="item-id">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-stone-500 uppercase tracking-widest ml-1">Kelas</label>
                        <select id="i-class" class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded p-2 text-xs outline-none focus:border-stone-500 dark:text-white">
                            <option value="X">Kelas X</option><option value="XI">Kelas XI</option><option value="XII">Kelas XII</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-stone-500 uppercase tracking-widest ml-1">Kategori</label>
                        <select id="i-kategori" class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded p-2 text-xs outline-none focus:border-stone-500 dark:text-white">
                            <option value="materi">Materi Inti</option><option value="literasi">Literasi</option><option value="pengayaan">Pengayaan</option><option value="serba serbi">Serba-serbi</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-stone-500 uppercase tracking-widest ml-1">Judul Narasi</label>
                    <input type="text" id="i-title" required class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded p-2 text-xs outline-none focus:border-stone-500 dark:text-white">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-stone-500 uppercase tracking-widest ml-1">Deskripsi Singkat</label>
                    <textarea id="i-desc" rows="2" class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded p-2 text-xs outline-none focus:border-stone-500 dark:text-white"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-stone-500 uppercase tracking-widest ml-1">Status</label>
                        <select id="i-status" class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded p-2 text-xs outline-none focus:border-stone-500 dark:text-white">
                            <option value="published">PUBLISHED</option><option value="draft">DRAFT</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-stone-500 uppercase tracking-widest ml-1">Tautan Sumber</label>
                        <input type="url" id="i-link" required class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded p-2 text-xs outline-none focus:border-stone-500 dark:text-white">
                    </div>
                </div>
                <input type="hidden" id="i-kd" value="INDX">
                <button type="submit" id="submit-btn" class="w-full py-3 bg-scholastic-ink text-white rounded font-black text-[10px] uppercase tracking-[0.3em] active:opacity-80 transition-all">Sinkronkan Data</button>
            </form>
        </div>
    </div>

    <!-- Final Refined Footer -->
    <footer class="max-w-screen-2xl mx-auto px-6 py-16 border-t border-stone-200 dark:border-stone-800">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-stone-500 dark:text-stone-600">
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-black tracking-[0.4em] uppercase">www.sosiologi.eu.org</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-[1px] w-4 bg-stone-300 dark:bg-stone-800"></span>
                <span class="text-[10px] font-medium tracking-widest uppercase">Repository Sosiologi Digital &copy; 2026</span>
            </div>
        </div>
    </footer>

    <div id="toast-box"></div>

    <script type="module">
        const SPREADSHEET_API_URL = "https://script.google.com/macros/s/AKfycbwZyqGF1gOuLmIL4PUEX8wxhJlQNecoujmBDy0MC8m3nNLETi_IwyE99inXjiZk3LwlPA/exec";

        window.state = { modules: [], search: '', filter: 'all', isAdmin: false, loading: true };

        const INTERNAL_ARCHIVE = [
            { id: "INT-1", class: 'X', kategori: 'materi', title: 'Sosiologi sebagai Ilmu Pengetahuan', desc: 'Membangun ontologi sosiologi sebagai kajian ilmiah yang empiris dan teoretis untuk membedah realitas sosial.', link: 'https://drive.google.com/file/d/1WixnAjL6mTuX2FlzKbHswg3Y0JYwPddN/view?usp=drive_link', context: 'Fundamental', time: 10, status: 'published', kd: '3.1' },
            { id: "INT-2", class: 'X', kategori: 'materi', title: 'Hubungan Sosial', desc: 'Analisis dialektika interaksi sosial, agensi individu, dan tindakan komunikatif dalam membangun struktur publik.', link: 'https://drive.google.com/file/d/1DM-BTJbpK-iZ2ahRt5SDub0a1fp7BIUv/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.2' },
            { id: "INT-3", class: 'X', kategori: 'materi', title: 'Ragam Gejala Sosial', desc: 'Fenomena sosial dalam bingkai nilai dan norma yang membentuk proses sosialisasi serta identitas kolektif.', link: 'https://drive.google.com/file/d/1ZT9QzhyVABcA0iVNtp_PQEpNNSiYYPpt/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.3' },
            { id: "INT-4", class: 'X', kategori: 'literasi', title: 'Metode Penelitian Sosial', desc: 'Dekonstruksi realitas melalui metodologi penelitian sosial: dari rancangan empiris hingga interpretasi data kritis.', link: 'https://drive.google.com/file/d/1AFsSqlQ0_dyRdpwwnx4YD8vA6lyNC88j/view?usp=drive_link', context: 'Kritis', time: 20, status: 'published', kd: '3.4' },
            { id: "INT-5", class: 'XI', kategori: 'materi', title: 'Kelompok Sosial di Masyarakat', desc: 'Strukturasi kelompok sosial dan dinamika antar-kelompok dalam membangun integrasi di tengah perbedaan.', link: 'https://drive.google.com/file/d/1WFoW-HFPkoXjxC96Lx6lx_zRGRK6I6o7/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.1' },
            { id: "INT-6", class: 'XI', kategori: 'literasi', title: 'Masalah dan Eksklusi Sosial', desc: 'Membedah akar patologi sosial, ketidakadilan struktural, dan mekanisme marjinalisasi kelompok rentan.', link: 'https://drive.google.com/file/d/1XuBQAuRkAaB7IOuIXc9dpV0hRFrqOFuO/view?usp=drive_link', context: 'Trending', time: 15, status: 'published', kd: '3.2' },
            { id: "INT-7", class: 'XI', kategori: 'materi', title: 'Kesetaraan Sosial', desc: 'Visi inklusi dalam masyarakat multikultural: harmoni di tengah di-ferensiasi dan stratifikasi sosial yang kompleks.', link: 'https://drive.google.com/file/d/12IdbE_d5_SLnWMiTSIWy-cLmVciWZZsW/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.3' },
            { id: "INT-8", class: 'XI', kategori: 'pengayaan', title: 'Konflik dan Resolusi Konflik', desc: 'Analisis kekerasan struktural, konflik kepentingan, dan model penyelesaian damai yang berkelanjutan di masyarakat.', link: 'https://drive.google.com/file/d/1e8irIfZmzRrnwyIhmwUE9GSCkajomDw0/view?usp=drive_link', context: 'Kritis', time: 20, status: 'published', kd: '3.4' },
            { id: "INT-9", class: 'XI', kategori: 'materi', title: 'Integrasi Sosial', desc: 'Sintesis hubungan pasca-konflik dan mekanisme reintegrasi dalam membangun resiliensi komunitas yang terbelah.', link: 'https://drive.google.com/file/d/1NGMu7neFY7C39-6EqC8VkxsVld-GZgBa/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.5' },
            { id: "INT-10", class: 'XII', kategori: 'materi', title: 'Perubahan Sosial Masyarakat', desc: 'Fenomenologi transformasi sosial di era modernitas: mengkaji faktor pendorong, arah perubahan, dan dampaknya.', link: 'https://drive.google.com/file/d/1j3aSW6yPx7DWXqWH3zrcn4YIoNW6XsJA/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.1' },
            { id: "INT-11", class: 'XII', kategori: 'serba serbi', title: 'Permasalahan Sosial Globalisasi', desc: 'Konvergensi budaya, ekonomi global, dan tantangan identitas lokal di tengah arus digitalisasi dunia yang masif.', link: 'https://drive.google.com/file/d/1q0pa5uE4QE8FO7qxbihYjZyXL480z8rL/view?usp=drive_link', context: 'Trending', time: 15, status: 'published', kd: '3.2' },
            { id: "INT-12", class: 'XII', kategori: 'pengayaan', title: 'Ketimpangan Sosial', desc: 'Kritik atas disparitas pembangunan dan ketidakadilan akses sumber daya di tengah kebijakan pembangunan global.', link: 'https://drive.google.com/file/d/1ZrSQ5mQ5SS61Ezqhbe7IKCI9fZVin_60/view?usp=drive_link', context: 'Kritis', time: 20, status: 'published', kd: '3.3' },
            { id: "INT-13", class: 'XII', kategori: 'materi', title: 'Strategi Pemberdayaan Komunitas', desc: 'Agensi lokal berbasis kearifan budaya sebagai instrumen pemberdayaan dan kedaulatan sosial masyarakat.', link: 'https://drive.google.com/file/d/1YTFY4ErqlaCeMbhhC04E6MRIOTzvAd8t/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.4' },
            { id: "INT-14", class: 'XII', kategori: 'literasi', title: 'Evaluasi Pemberdayaan', desc: 'Epistemologi pemantauan dan penilaian efektivitas program intervensi sosial untuk keberlanjutan perubahan.', link: 'https://drive.google.com/file/d/11UvmLIOyxkTXnQPBdXDR3ispS0eR_KjG/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.5' }
        ];

        async function syncCloud() {
            try {
                const response = await fetch(SPREADSHEET_API_URL);
                state.modules = await response.json();
            } catch (e) { console.warn("Cloud sync latency."); }
            state.loading = false; renderApp();
        }

        async function trackEngagement(id) {
            if (!id) return;
            fetch(SPREADSHEET_API_URL, { 
                method: 'POST', mode: 'no-cors', cache: 'no-cache',
                body: JSON.stringify({ action: 'track_view', id: id }) 
            });
        }

        window.notify = (msg) => {
            const wrap = document.getElementById('toast-box');
            const t = document.createElement('div');
            t.className = `px-4 py-2 arch-card rounded shadow mb-2 border-l-2 border-stone-500 animate-reveal`;
            t.innerHTML = `<span class="text-[9px] font-bold uppercase tracking-widest text-stone-600">${msg}</span>`;
            wrap.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0'); setTimeout(() => t.remove(), 600); }, 3000);
        };

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        window.openOtoritas = () => {
            if(state.isAdmin) {
                state.isAdmin = false; document.getElementById('add-btn').classList.add('hidden');
                notify("Akses Publik Aktif."); renderApp();
            } else { showGlobalModal('modal-auth'); document.getElementById('auth-field').focus(); }
        };

        window.doAuth = () => {
            if(document.getElementById('auth-field').value === 'cornelcktc') {
                state.isAdmin = true; document.getElementById('add-btn').classList.remove('hidden');
                closeModals(); notify("Kurator Terverifikasi."); renderApp();
            } else { notify("Akses Ditolak."); }
            document.getElementById('auth-field').value = '';
        };

        window.applyFilter = (v) => { 
            state.filter = v; 
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'bg-scholastic-ink', 'text-white');
                b.classList.add('text-scholastic-lead');
            });
            const active = document.getElementById(`f-${v}`);
            active.classList.add('active', 'bg-scholastic-ink', 'text-white');
            renderApp(); 
        };
        
        window.handleSearch = () => { state.search = document.getElementById('search-input').value.toLowerCase(); renderApp(); };

        const overlay = document.getElementById('modal-overlay');
        window.showGlobalModal = (id) => { overlay.classList.remove('hidden'); overlay.classList.add('flex'); setTimeout(() => overlay.classList.add('opacity-100'), 10); document.getElementById(id).classList.remove('hidden'); };
        window.closeModals = () => { overlay.classList.remove('opacity-100'); setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden')); }, 300); };

        window.openEditor = (id = null) => {
            showGlobalModal('modal-editor');
            const form = document.getElementById('main-form');
            form.reset();
            document.getElementById('item-id').value = id || '';
            if(id) {
                const m = state.modules.find(d => d.id == id) || INTERNAL_ARCHIVE.find(d => d.id === id);
                document.getElementById('i-class').value = m.class;
                document.getElementById('i-kategori').value = m.kategori;
                document.getElementById('i-title').value = m.title;
                document.getElementById('i-desc').value = m.desc;
                document.getElementById('i-status').value = m.status;
                document.getElementById('i-link').value = m.link;
            }
        };

        document.getElementById('main-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SINKRONISASI...";
            const payload = {
                action: 'upsert', id: document.getElementById('item-id').value || "SOC-" + Date.now(),
                class: document.getElementById('i-class').value, kategori: document.getElementById('i-kategori').value,
                title: document.getElementById('i-title').value, desc: document.getElementById('i-desc').value,
                status: document.getElementById('i-status').value, kd: document.getElementById('i-kd').value,
                link: document.getElementById('i-link').value, time: 15
            };
            try {
                await fetch(SPREADSHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                notify("Tersimpan."); setTimeout(() => location.reload(), 2000);
            } catch (err) { notify("Gagal."); btn.disabled = false; btn.innerText = "SINKRONKAN DATA"; }
        };

        function renderApp() {
            const grid = document.getElementById('grid-content'); grid.innerHTML = '';
            if (state.loading) {
                for(let i=0; i<10; i++) grid.innerHTML += `<div class="arch-card rounded p-4 h-32 flex flex-col gap-2 shadow-none"><div class="w-8 h-2 shimmer rounded"></div><div class="w-full h-4 shimmer rounded"></div><div class="w-2/3 h-2 shimmer rounded"></div></div>`;
                return;
            }
            const cloudIds = new Set(state.modules.map(m => m.id));
            const baseData = [...state.modules, ...INTERNAL_ARCHIVE.filter(m => !cloudIds.has(m.id))];
            const filtered = baseData.filter(m => {
                if (!state.isAdmin && m.status !== 'published') return false;
                const matchTab = state.filter === 'all' || m.class === state.filter;
                const matchSearch = m.title.toLowerCase().includes(state.search) || m.desc.toLowerCase().includes(state.search);
                return matchTab && matchSearch;
            });
            if (filtered.length === 0) document.getElementById('no-data').classList.remove('hidden');
            else document.getElementById('no-data').classList.add('hidden');

            filtered.forEach((m, i) => {
                const isPublished = m.status === 'published';
                grid.innerHTML += `
                    <div class="group arch-card rounded p-4 flex flex-col h-full ${!isPublished ? 'opacity-40 grayscale' : ''}">
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-1.5 py-0.5 bg-stone-50 dark:bg-stone-800 text-[6px] font-black text-stone-500 rounded tracking-widest uppercase shadow-none">KLS ${m.class}</span>
                            ${state.isAdmin ? `<button onclick="openEditor('${m.id}')" class="text-stone-500 hover:text-scholastic-ink transition-colors"><i class="fa-solid fa-marker text-[8px]"></i></button>` : `<i class="fa-solid fa-bookmark text-[7px] text-stone-100 dark:text-stone-800"></i>`}
                        </div>
                        <div class="mb-1">
                            <span class="text-[7px] font-bold text-scholastic-ink dark:text-stone-400 uppercase tracking-widest">${m.kategori || 'Narasi'}</span>
                            ${state.isAdmin && !isPublished ? '<span class="text-[5px] font-bold text-red-700 bg-red-50 px-1 py-0.2 ml-1 rounded uppercase">Draft</span>' : ''}
                        </div>
                        <h3 class="font-serif font-black text-sm text-scholastic-ink dark:text-white mb-2 leading-snug tracking-tight line-clamp-titles">${m.title}</h3>
                        <p class="text-[9px] text-stone-500 dark:text-stone-500 leading-relaxed line-clamp-descs mb-4">"${m.desc}"</p>
                        <div class="mt-auto flex justify-between items-center pt-2 border-t border-stone-50 dark:border-stone-800">
                            <span class="text-[8px] font-black text-stone-500 dark:text-stone-700 tracking-widest uppercase">${m.kd || 'INDX'}</span>
                            <a href="${m.link}" target="_blank" onclick="trackEngagement('${m.id}')" class="text-[7px] font-bold uppercase tracking-[0.2em] px-3 py-1.5 bg-stone-50 dark:bg-stone-800 text-scholastic-ink dark:text-stone-300 rounded hover:bg-scholastic-ink hover:text-white transition-all">Akses</a>
                        </div>
                    </div>`;
            });
        }
        
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        syncCloud();
    </script>
</body>
</html>
