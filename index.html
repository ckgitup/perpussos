<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokus Dialektika | www.sosiologi.eu.org</title>
    
    <!-- Core Assets: Tailwind, FontAwesome, Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Outfit"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        scholastic: {
                            base: '#f8fafc',
                            midnight: '#0f172a', // Oxford Blue
                            ink: '#1e293b',
                            accent: '#6366f1', // Indigo pencerah
                            stone: '#64748b',
                            crimson: '#9f1239'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Desain Scrollbar Minimalis */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        body { 
            background-color: #f8fafc; 
            color: #0f172a;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            font-size: 0.9rem;
        }
        .dark body { background-color: #020617; color: #cbd5e1; }

        /* Card Geometry - Optimized for high-density reading */
        .arch-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dark .arch-card {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .arch-card:hover {
            transform: translateY(-3px);
            border-color: #6366f1;
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.1);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent 25%, rgba(99, 102, 241, 0.03) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmerEffect 1.5s infinite linear;
        }
        @keyframes shimmerEffect { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .text-balanced { text-wrap: balance; }
        
        /* Clamp titles and descs for rigid grid uniformity */
        .line-clamp-titles { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-descs { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-scholastic-accent selection:text-white">

    <!-- Minimalist Floating Control Area -->
    <nav class="fixed top-4 right-4 z-[200] flex flex-row gap-2">
        <button onclick="toggleDarkMode()" class="w-9 h-9 arch-card rounded-lg flex items-center justify-center text-scholastic-ink dark:text-scholastic-stone hover:text-scholastic-accent transition-all">
            <i id="theme-ico" class="fa-solid fa-moon text-xs"></i>
        </button>
        <button onclick="openOtoritas()" id="admin-trigger" class="w-9 h-9 arch-card rounded-lg flex items-center justify-center text-slate-400 hover:text-scholastic-accent transition-all">
            <i class="fa-solid fa-shield-halved text-xs"></i>
        </button>
        <button onclick="openEditor()" id="add-btn" class="hidden w-9 h-9 bg-scholastic-accent text-white rounded-lg flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-all">
            <i class="fa-solid fa-plus text-xs"></i>
        </button>
    </nav>

    <!-- Professional Editorial Header -->
    <header class="max-w-screen-2xl mx-auto px-6 pt-10 pb-6 border-b border-slate-100 dark:border-slate-900">
        <div class="flex flex-col md:flex-row items-baseline justify-between gap-4">
            <div>
                <span class="text-[8px] font-black uppercase tracking-[0.5em] text-scholastic-accent block mb-1">Knowledge Ecosystem</span>
                <h1 class="text-3xl md:text-5xl font-serif font-black text-scholastic-midnight dark:text-white tracking-tighter">
                    Lokus <span class="text-scholastic-accent italic">Dialektika.</span>
                </h1>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-black text-slate-300 dark:text-slate-700 uppercase tracking-[0.6em] block">www.sosiologi.eu.org</span>
                <span class="text-xs font-serif italic text-scholastic-stone dark:text-slate-500">Imajinasi, Struktur, Agensi.</span>
            </div>
        </div>
    </header>

    <!-- Search & Filter Bar - Space Optimized -->
    <main class="max-w-screen-2xl mx-auto px-6 pb-40">
        <div class="flex flex-col md:flex-row items-center gap-3 mt-8 mb-10 sticky top-4 z-50">
            <div class="arch-card rounded-xl p-1.5 flex-1 w-full flex items-center gap-3 border-none shadow-lg">
                <div class="relative flex-1 group">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-scholastic-accent transition-colors text-xs"></i>
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari narasi atau indeks..." class="w-full pl-10 pr-4 py-2 bg-transparent border-none focus:ring-0 text-scholastic-midnight dark:text-white font-medium text-sm placeholder-slate-400/50">
                </div>
                <div class="h-6 w-[1px] bg-slate-100 dark:bg-slate-800 hidden md:block"></div>
                <div class="flex items-center gap-1 overflow-x-auto no-scrollbar pr-1 shrink-0">
                    <button onclick="applyFilter('all')" id="f-all" class="tab-btn active px-4 py-1.5 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all bg-scholastic-midnight dark:bg-scholastic-accent text-white">Semua</button>
                    <button onclick="applyFilter('X')" id="f-X" class="tab-btn px-4 py-1.5 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all hover:bg-slate-50 dark:hover:bg-slate-800 text-scholastic-stone">Kls X</button>
                    <button onclick="applyFilter('XI')" id="f-XI" class="tab-btn px-4 py-1.5 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all hover:bg-slate-50 dark:hover:bg-slate-800 text-scholastic-stone">Kls XI</button>
                    <button onclick="applyFilter('XII')" id="f-XII" class="tab-btn px-4 py-1.5 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all hover:bg-slate-50 dark:hover:bg-slate-800 text-scholastic-stone">Kls XII</button>
                </div>
            </div>
        </div>

        <!-- High-Density Material Grid -->
        <div id="grid-content" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4">
            <!-- Render via Script -->
        </div>

        <div id="no-data" class="hidden py-40 text-center">
            <i class="fa-solid fa-folder-open text-2xl text-slate-200 mb-3"></i>
            <h3 class="text-sm font-bold text-scholastic-midnight dark:text-white uppercase tracking-widest">Ruang Hampa</h3>
            <p class="text-[10px] text-scholastic-stone dark:text-slate-400 font-light">Narasi belum diarsipkan.</p>
        </div>
    </main>

    <!-- SISTEM MODAL - Compact Form for Mass Entry -->
    <div id="modal-overlay" class="fixed inset-0 bg-scholastic-midnight/90 backdrop-blur-md z-[300] hidden items-center justify-center p-4 transition-all duration-400 opacity-0">
        
        <!-- Auth Modal -->
        <div id="modal-auth" class="hidden arch-card w-full max-w-xs rounded-2xl p-8 text-center border-white/10 shadow-2xl">
            <h3 class="text-lg font-black text-scholastic-midnight dark:text-white mb-6 tracking-tighter uppercase">Otoritas Kurator</h3>
            <input type="password" id="auth-field" class="w-full bg-slate-50 dark:bg-scholastic-midnight/50 border border-slate-200 dark:border-slate-800 rounded-xl p-4 text-center text-3xl tracking-[0.5em] mb-6 outline-none focus:ring-2 ring-scholastic-accent/30 dark:text-white" placeholder="••••">
            <div class="flex flex-col gap-2">
                <button onclick="doAuth()" class="w-full py-3 bg-scholastic-accent text-white rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Masuk</button>
                <button onclick="closeModals()" class="w-full py-2 text-slate-400 text-[9px] font-bold uppercase tracking-widest hover:text-scholastic-accent">Batal</button>
            </div>
        </div>

        <!-- Editor Modal - Highly Efficient -->
        <div id="modal-editor" class="hidden arch-card w-full max-w-lg rounded-3xl p-6 relative overflow-y-auto max-h-[90vh] border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-slate-50 dark:border-slate-800 pb-4">
                <div>
                    <h3 id="form-header" class="text-xl font-serif font-black text-scholastic-midnight dark:text-white">Editor Narasi</h3>
                    <p class="text-[7px] text-scholastic-accent uppercase tracking-[0.6em] font-black mt-1">www.sosiologi.eu.org</p>
                </div>
                <button onclick="closeModals()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 dark:bg-onyx-800 text-slate-400 hover:text-scholastic-crimson transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="main-form" class="space-y-4">
                <input type="hidden" id="item-id">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Tingkat Kelas</label>
                        <select id="i-class" class="w-full bg-slate-50 dark:bg-scholastic-midnight rounded-lg p-2.5 text-xs border border-slate-200 dark:border-slate-800 focus:ring-2 ring-scholastic-accent/20 outline-none">
                            <option value="X">Kelas X</option><option value="XI">Kelas XI</option><option value="XII">Kelas XII</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Kategori Konten</label>
                        <select id="i-kategori" class="w-full bg-slate-50 dark:bg-scholastic-midnight rounded-lg p-2.5 text-xs border border-slate-200 dark:border-slate-800 focus:ring-2 ring-scholastic-accent/20 outline-none">
                            <option value="materi">Materi Inti</option><option value="literasi">Literasi</option><option value="pengayaan">Pengayaan</option><option value="serba serbi">Serba-serbi</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Judul Materi</label>
                    <input type="text" id="i-title" required class="w-full bg-slate-50 dark:bg-scholastic-midnight rounded-lg p-2.5 text-xs border border-slate-200 dark:border-slate-800 focus:ring-2 ring-scholastic-accent/20 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Abstraksi (Deskripsi Singkat)</label>
                    <textarea id="i-desc" rows="2" class="w-full bg-slate-50 dark:bg-scholastic-midnight rounded-lg p-2.5 text-xs border border-slate-200 dark:border-slate-800 focus:ring-2 ring-scholastic-accent/20 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Status Publikasi</label>
                        <select id="i-status" class="w-full bg-slate-50 dark:bg-scholastic-midnight rounded-lg p-2.5 text-xs border border-slate-200 dark:border-slate-800 focus:ring-2 ring-scholastic-accent/20 outline-none">
                            <option value="published">PUBLISHED</option><option value="draft">DRAFT</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Tautan Sumber</label>
                        <input type="url" id="i-link" required class="w-full bg-slate-50 dark:bg-scholastic-midnight rounded-lg p-2.5 text-xs border border-slate-200 dark:border-slate-800 focus:ring-2 ring-scholastic-accent/20 outline-none">
                    </div>
                </div>
                <input type="hidden" id="i-kd" value="INDX">
                <button type="submit" id="submit-btn" class="w-full py-4 bg-scholastic-midnight dark:bg-scholastic-accent text-white dark:text-scholastic-midnight rounded-xl font-black text-[9px] uppercase tracking-[0.4em] shadow-xl hover:scale-[1.01] active:scale-95 transition-all">SINKRONKAN DIALEKTIKA</button>
            </form>
        </div>
    </div>

    <!-- Branding Footer Initial -->
    <div class="fixed bottom-4 left-6 z-[100] hidden md:block">
        <span class="text-[7px] font-black uppercase tracking-[1em] text-slate-200 dark:text-slate-800 hover:text-scholastic-accent transition-colors cursor-default">www.sosiologi.eu.org</span>
    </div>

    <div id="toast-box"></div>

    <script type="module">
        // --- LOGIC RETAINED FROM PREVIOUS WORKING VERSION ---
        const SPREADSHEET_API_URL = "https://script.google.com/macros/s/AKfycbwZyqGF1gOuLmIL4PUEX8wxhJlQNecoujmBDy0MC8m3nNLETi_IwyE99inXjiZk3LwlPA/exec";

        window.state = { modules: [], search: '', filter: 'all', isAdmin: false, loading: true };

        const INTERNAL_ARCHIVE = [
            { id: "INT-1", class: 'X', kategori: 'materi', title: 'Sosiologi sebagai Ilmu Pengetahuan', desc: 'Membangun ontologi sosiologi sebagai kajian ilmiah yang empiris dan teoretis untuk membedah realitas sosial.', link: 'https://drive.google.com/file/d/1WixnAjL6mTuX2FlzKbHswg3Y0JYwPddN/view?usp=drive_link', context: 'Fundamental', time: 10, status: 'published', kd: '3.1' },
            { id: "INT-2", class: 'X', kategori: 'materi', title: 'Hubungan Sosial', desc: 'Analisis dialektika interaksi sosial, agensi individu, dan tindakan komunikatif dalam membangun struktur publik.', link: 'https://drive.google.com/file/d/1DM-BTJbpK-iZ2ahRt5SDub0a1fp7BIUv/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.2' },
            { id: "INT-3", class: 'X', kategori: 'materi', title: 'Ragam Gejala Sosial', desc: 'Fenomena sosial dalam bingkai nilai dan norma yang membentuk proses sosialisasi serta identitas kolektif.', link: 'https://drive.google.com/file/d/1ZT9QzhyVABcA0iVNtp_PQEpNNSiYYPpt/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.3' },
            { id: "INT-4", class: 'X', kategori: 'literasi', title: 'Metode Penelitian Sosial', desc: 'Dekonstruksi realitas melalui metodologi penelitian sosial: dari rancangan empiris hingga interpretasi data kritis.', link: 'https://drive.google.com/file/d/1AFsSqlQ0_dyRdpwwnx4YD8vA6lyNC88j/view?usp=drive_link', context: 'Kritis', time: 20, status: 'published', kd: '3.4' },
            { id: "INT-5", class: 'XI', kategori: 'materi', title: 'Kelompok Sosial di Masyarakat', desc: 'Strukturasi kelompok sosial dan dinamika antar-kelompok dalam membangun integrasi di tengah perbedaan.', link: 'https://drive.google.com/file/d/1WFoW-HFPkoXjxC96Lx6lx_zRGRK6I6o7/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.1' },
            { id: "INT-6", class: 'XI', kategori: 'literasi', title: 'Masalah dan Eksklusi Sosial', desc: 'Membedah akar patologi sosial, ketidakadilan struktural, dan mekanisme marjinalisasi kelompok rentan.', link: 'https://drive.google.com/file/d/1XuBQAuRkAaB7IOuIXc9dpV0hRFrqOFuO/view?usp=drive_link', context: 'Trending', time: 15, status: 'published', kd: '3.2' },
            { id: "INT-7", class: 'XI', kategori: 'materi', title: 'Kesetaraan Sosial', desc: 'Visi inklusi dalam masyarakat multikultural: harmoni di tengah diferensiasi dan stratifikasi sosial yang kompleks.', link: 'https://drive.google.com/file/d/12IdbE_d5_SLnWMiTSIWy-cLmVciWZZsW/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.3' },
            { id: "INT-8", class: 'XI', kategori: 'pengayaan', title: 'Konflik dan Resolusi Konflik', desc: 'Analisis kekerasan struktural, konflik kepentingan, dan model penyelesaian damai yang berkelanjutan di masyarakat.', link: 'https://drive.google.com/file/d/1e8irIfZmzRrnwyIhmwUE9GSCkajomDw0/view?usp=drive_link', context: 'Kritis', time: 20, status: 'published', kd: '3.4' },
            { id: "INT-9", class: 'XI', kategori: 'materi', title: 'Integrasi Sosial', desc: 'Sintesis hubungan pasca-konflik dan mekanisme reintegrasi dalam membangun resiliensi komunitas yang terbelah.', link: 'https://drive.google.com/file/d/1NGMu7neFY7C39-6EqC8VkxsVld-GZgBa/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.5' },
            { id: "INT-10", class: 'XII', kategori: 'materi', title: 'Perubahan Sosial Masyarakat', desc: 'Fenomenologi transformasi sosial di era modernitas: mengkaji faktor pendorong, arah perubahan, dan dampaknya.', link: 'https://drive.google.com/file/d/1j3aSW6yPx7DWXqWH3zrcn4YIoNW6XsJA/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.1' },
            { id: "INT-11", class: 'XII', kategori: 'serba serbi', title: 'Permasalahan Sosial Globalisasi', desc: 'Konvergensi budaya, ekonomi global, dan tantangan identitas lokal di tengah arus digitalisasi dunia yang masif.', link: 'https://drive.google.com/file/d/1q0pa5uE4QE8FO7qxbihYjZyXL480z8rL/view?usp=drive_link', context: 'Trending', time: 15, status: 'published', kd: '3.2' },
            { id: "INT-12", class: 'XII', kategori: 'pengayaan', title: 'Ketimpangan Sosial', desc: 'Kritik atas disparitas pembangunan dan ketidakadilan akses sumber daya di tengah kebijakan pembangunan global.', link: 'https://drive.google.com/file/d/1ZrSQ5mQ5SS61Ezqhbe7IKCI9fZVin_60/view?usp=drive_link', context: 'Kritis', time: 20, status: 'published', kd: '3.3' },
            { id: "INT-13", class: 'XII', kategori: 'materi', title: 'Strategi Pemberdayaan Komunitas', desc: 'Agensi lokal berbasis kearifan budaya sebagai instrumen pemberdayaan dan kedaulatan sosial masyarakat.', link: 'https://drive.google.com/file/d/1YTFY4ErqlaCeMbhhC04E6MRIOTzvAd8t/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.4' },
            { id: "INT-14", class: 'XII', kategori: 'literasi', title: 'Evaluasi Pemberdayaan', desc: 'Epistemologi pemantauan dan penilaian efektivitas program intervensi sosial untuk keberlanjutan perubahan.', link: 'https://drive.google.com/file/d/11UvmLIOyxkTXnQPBdXDR3ispS0eR_KjG/view?usp=drive_link', context: 'Fundamental', time: 15, status: 'published', kd: '3.5' }
        ];

        async function syncCloud() {
            try {
                const response = await fetch(SPREADSHEET_API_URL);
                state.modules = await response.json();
            } catch (e) { console.warn("Cloud sync delayed."); }
            state.loading = false; renderApp();
        }

        async function trackEngagement(id) {
            if (!id) return;
            fetch(SPREADSHEET_API_URL, { 
                method: 'POST', mode: 'no-cors', cache: 'no-cache',
                body: JSON.stringify({ action: 'track_view', id: id }) 
            });
        }

        window.notify = (msg) => {
            const wrap = document.getElementById('toast-box');
            const t = document.createElement('div');
            t.className = `px-5 py-2 arch-card rounded-lg shadow-lg mb-2 border-l-4 border-scholastic-accent animate-reveal`;
            t.innerHTML = `<span class="text-[8px] font-black uppercase tracking-widest">${msg}</span>`;
            wrap.appendChild(t);
            setTimeout(() => { t.classList.add('opacity-0'); setTimeout(() => t.remove(), 600); }, 3000);
        };

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        window.openOtoritas = () => {
            if(state.isAdmin) {
                state.isAdmin = false; document.getElementById('add-btn').classList.add('hidden');
                notify("Akses Publik."); renderApp();
            } else { showGlobalModal('modal-auth'); document.getElementById('auth-field').focus(); }
        };

        window.doAuth = () => {
            if(document.getElementById('auth-field').value === 'cornelcktc') {
                state.isAdmin = true; document.getElementById('add-btn').classList.remove('hidden');
                closeModals(); notify("Terverifikasi."); renderApp();
            } else { notify("Ditolak."); }
            document.getElementById('auth-field').value = '';
        };

        window.applyFilter = (v) => { 
            state.filter = v; 
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'bg-scholastic-midnight', 'dark:bg-scholastic-accent', 'text-white', 'dark:text-scholastic-midnight');
                b.classList.add('text-scholastic-stone');
            });
            const active = document.getElementById(`f-${v}`);
            active.classList.add('active', 'bg-scholastic-midnight', 'dark:bg-scholastic-accent', 'text-white', 'dark:text-scholastic-midnight');
            renderApp(); 
        };
        
        window.handleSearch = () => { state.search = document.getElementById('search-input').value.toLowerCase(); renderApp(); };

        const overlay = document.getElementById('modal-overlay');
        window.showGlobalModal = (id) => { overlay.classList.remove('hidden'); overlay.classList.add('flex'); setTimeout(() => overlay.classList.add('opacity-100'), 10); document.getElementById(id).classList.remove('hidden'); };
        window.closeModals = () => { overlay.classList.remove('opacity-100'); setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden')); }, 300); };

        window.openEditor = (id = null) => {
            showGlobalModal('modal-editor');
            const form = document.getElementById('main-form');
            form.reset();
            document.getElementById('item-id').value = id || '';
            if(id) {
                const m = state.modules.find(d => d.id == id) || INTERNAL_ARCHIVE.find(d => d.id === id);
                document.getElementById('i-class').value = m.class;
                document.getElementById('i-kategori').value = m.kategori;
                document.getElementById('i-title').value = m.title;
                document.getElementById('i-desc').value = m.desc;
                document.getElementById('i-status').value = m.status;
                document.getElementById('i-link').value = m.link;
            }
        };

        document.getElementById('main-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "SINKRONISASI...";
            const payload = {
                action: 'upsert',
                id: document.getElementById('item-id').value || "SOC-" + Date.now(),
                class: document.getElementById('i-class').value,
                kategori: document.getElementById('i-kategori').value,
                title: document.getElementById('i-title').value,
                desc: document.getElementById('i-desc').value,
                status: document.getElementById('i-status').value,
                kd: document.getElementById('i-kd').value,
                link: document.getElementById('i-link').value,
                time: 15
            };
            try {
                await fetch(SPREADSHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                notify("Selesai.");
                setTimeout(() => location.reload(), 1500);
            } catch (err) { notify("Gagal."); btn.disabled = false; btn.innerText = "SINKRONKAN DIALEKTIKA"; }
        };

        function renderApp() {
            const grid = document.getElementById('grid-content'); grid.innerHTML = '';
            if (state.loading) {
                for(let i=0; i<12; i++) grid.innerHTML += `<div class="arch-card rounded-xl p-4 h-40 flex flex-col gap-2"><div class="w-10 h-3 shimmer rounded"></div><div class="w-full h-5 shimmer rounded"></div><div class="w-2/3 h-3 shimmer rounded"></div></div>`;
                return;
            }
            const cloudIds = new Set(state.modules.map(m => m.id));
            const baseData = [...state.modules, ...INTERNAL_ARCHIVE.filter(m => !cloudIds.has(m.id))];
            const filtered = baseData.filter(m => {
                if (!state.isAdmin && m.status !== 'published') return false;
                const matchTab = state.filter === 'all' || m.class === state.filter;
                const matchSearch = m.title.toLowerCase().includes(state.search) || m.desc.toLowerCase().includes(state.search);
                return matchTab && matchSearch;
            });
            if (filtered.length === 0) document.getElementById('no-data').classList.remove('hidden');
            else document.getElementById('no-data').classList.add('hidden');

            filtered.forEach((m, i) => {
                const isPublished = m.status === 'published';
                grid.innerHTML += `
                    <div class="group arch-card rounded-xl p-4 flex flex-col h-full ${!isPublished ? 'opacity-40 grayscale' : ''}" style="animation: reveal 0.4s ease-out forwards ${i*0.012}s">
                        <div class="flex justify-between items-center mb-3">
                            <span class="px-1.5 py-0.5 bg-scholastic-midnight dark:bg-slate-900 text-[6px] font-black text-white rounded tracking-widest uppercase shadow-sm">KLS ${m.class}</span>
                            ${state.isAdmin ? `<button onclick="openEditor('${m.id}')" class="text-slate-400 hover:text-scholastic-accent transition-colors"><i class="fa-solid fa-pen-to-square text-[9px]"></i></button>` : `<i class="fa-solid fa-feather-pointed text-[8px] text-slate-200 dark:text-slate-800"></i>`}
                        </div>
                        <div class="mb-1.5 flex items-center gap-1.5">
                            <span class="text-[7px] font-black text-scholastic-accent uppercase tracking-widest">${m.kategori || 'Narasi'}</span>
                            ${state.isAdmin && !isPublished ? '<span class="text-[6px] font-bold text-scholastic-crimson bg-scholastic-crimson/5 px-1.5 py-0.2 rounded-full uppercase">Draft</span>' : ''}
                        </div>
                        <h3 class="font-serif font-black text-sm text-scholastic-midnight dark:text-white mb-1.5 leading-snug group-hover:text-scholastic-accent transition-colors tracking-tight line-clamp-titles">${m.title}</h3>
                        <p class="text-[9px] text-scholastic-stone dark:text-slate-400 leading-relaxed line-clamp-descs mb-4 font-light opacity-80 italic">"${m.desc}"</p>
                        <div class="mt-auto flex justify-between items-center pt-2.5 border-t border-slate-50 dark:border-slate-800/50">
                            <span class="text-[7px] font-black text-slate-300 dark:text-slate-700 tracking-widest uppercase">${m.kd || 'INDX'}</span>
                            <a href="${m.link}" target="_blank" onclick="trackEngagement('${m.id}')" class="text-[7px] font-black uppercase tracking-[0.2em] px-3.5 py-1.5 bg-scholastic-midnight dark:bg-scholastic-accent text-white dark:text-scholastic-midnight rounded-md hover:scale-105 active:scale-95 transition-all shadow-sm">Buka</a>
                        </div>
                    </div>`;
            });
        }
        
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        syncCloud();
    </script>
</body>
</html>
